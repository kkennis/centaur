name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, docker]
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    defaults:
      run:
        working-directory: /home/ubuntu/github/paradigmxyz/ai_v2

    steps:
      # --- Workspace setup ---

      - name: Clean runner workspace
        working-directory: ${{ github.workspace }}
        run: sudo find . -name __pycache__ -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync canonical dir
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Ensure external volumes exist
        run: |
          docker volume create ai_v2_firewall-certs 2>/dev/null || true
          docker volume create ai_v2_prometheusdata 2>/dev/null || true
          docker volume create ai_v2_lokidata 2>/dev/null || true

      # --- Detect what changed ---

      - name: Detect changes
        id: changes
        working-directory: ${{ github.workspace }}
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "scope=all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DIFF=$(git diff --name-only "$BEFORE" ${{ github.sha }} 2>/dev/null || echo "")
          if [ -z "$DIFF" ]; then
            echo "scope=all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "diff<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # If infra files changed, rebuild everything
          if echo "$DIFF" | grep -qE '^(Dockerfile|pyproject\.toml|uv\.lock|docker-compose\.yml|migrations/|services/|monitoring/)'; then
            echo "scope=all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Otherwise, figure out which services changed
          SCOPE=""
          echo "$DIFF" | grep -q '^src/' && SCOPE="${SCOPE} api"
          echo "$DIFF" | grep -q '^apps/slackbot/' && SCOPE="${SCOPE} slackbot"
          echo "$DIFF" | grep -q '^sandbox/' && SCOPE="${SCOPE} sandbox"
          echo "$DIFF" | grep -q '^tools/' && SCOPE="${SCOPE} tools"

          if [ -z "$SCOPE" ]; then
            echo "scope=none" >> "$GITHUB_OUTPUT"
          else
            echo "scope=${SCOPE}" >> "$GITHUB_OUTPUT"
          fi

      # --- Deploy ---

      - name: Deploy all services
        if: steps.changes.outputs.scope == 'all'
        run: docker compose up -d --build

      - name: Deploy API + ETL
        if: steps.changes.outputs.scope != 'all' && contains(steps.changes.outputs.scope, 'api')
        run: docker compose up -d --build --wait api etl

      - name: Deploy slackbot
        if: steps.changes.outputs.scope != 'all' && contains(steps.changes.outputs.scope, 'slackbot')
        run: |
          test ! -f apps/slackbot/package-lock.json
          docker compose up -d --build --no-deps slackbot

      - name: Build sandbox image
        if: steps.changes.outputs.scope != 'all' && contains(steps.changes.outputs.scope, 'sandbox')
        run: docker build -t agent2:latest sandbox/

      - name: Reload tools
        if: steps.changes.outputs.scope != 'all' && contains(steps.changes.outputs.scope, 'tools') && !contains(steps.changes.outputs.scope, 'api')
        run: |
          if [ -z "${API_SECRET_KEY:-}" ]; then
            echo "Skipping: API_SECRET_KEY not configured"
            exit 0
          fi
          curl -sf -X POST http://localhost:8000/admin/reload-tools \
            -H "Authorization: Bearer $API_SECRET_KEY"

      # --- Post-deploy ---

      - name: Restart nginx
        if: steps.changes.outputs.scope == 'all' || contains(steps.changes.outputs.scope, 'api')
        run: docker compose restart nginx

      - name: Health check
        if: steps.changes.outputs.scope != 'none'
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "API health check failed after 60s"
          exit 1

      - name: Secrets health check
        if: steps.changes.outputs.scope == 'all' || contains(steps.changes.outputs.scope, 'api')
        run: |
          for i in $(seq 1 90); do
            CID=$(docker compose ps -q secrets 2>/dev/null)
            if [ -z "$CID" ]; then
              sleep 1
              continue
            fi
            FMT='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}'
            STATUS=$(docker inspect --format "$FMT" "$CID")
            if [ "$STATUS" = "healthy" ]; then
              echo "Secrets healthy after ${i}s"
              exit 0
            fi
            if [ "$STATUS" = "unhealthy" ]; then
              echo "Secrets unhealthy"
              docker compose logs --tail 50 secrets || true
              exit 1
            fi
            sleep 1
          done
          echo "Secrets health check timed out"
          docker compose logs --tail 50 secrets || true
          exit 1

      # --- Notify ---

      - name: Notify Slack
        if: always() && steps.changes.outputs.scope != 'none'
        continue-on-error: true
        run: |
          if [ -z "${OPENAI_API_KEY:-}" ] || [ -z "${SLACK_BOT_TOKEN:-}" ]; then
            echo "Skipping Slack notification: missing secrets"
            exit 0
          fi

          ERROR_LOG=""
          if [ "${{ job.status }}" = "failure" ]; then
            ERROR_LOG=$(gh run view ${{ github.run_id }} --log-failed --repo ${{ github.repository }} 2>&1 | tail -40 || echo "Failed to fetch logs")
          fi

          export OPENAI_API_KEY SLACK_BOT_TOKEN
          ./scripts/deploy-notify.sh \
            "${{ github.event.before }}" \
            "${{ github.sha }}" \
            "${{ steps.changes.outputs.scope }}" \
            "${{ github.repository }}" \
            "${{ job.status }}" \
            "$ERROR_LOG"
