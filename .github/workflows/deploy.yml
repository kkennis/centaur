name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       github.event.pull_request.base.ref == 'main') ||
      (github.event_name == 'push' && github.event.pusher.name != 'web-flow')
    runs-on: [self-hosted, linux, x64, docker]
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    defaults:
      run:
        working-directory: /home/ubuntu/github/paradigmxyz/ai_v2

    steps:
      # --- Workspace setup ---

      - name: Clean runner workspace
        working-directory: ${{ github.workspace }}
        run: sudo find . -name __pycache__ -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync canonical dir
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Ensure external volumes exist
        run: |
          docker volume create ai_v2_firewall-certs 2>/dev/null || true
          docker volume create ai_v2_prometheusdata 2>/dev/null || true
          docker volume create ai_v2_lokidata 2>/dev/null || true

      # --- Deploy ---

      - name: Build sandbox image
        run: docker build -t agent2:latest sandbox/

      - name: Deploy all services
        run: docker compose up -d --build

      - name: Restart nginx
        run: docker compose restart nginx

      # --- Post-deploy health checks ---

      - name: Health check
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "API health check failed after 60s"
          exit 1

      - name: Verify tools loaded
        continue-on-error: true
        run: |
          if [ -z "${API_SECRET_KEY:-}" ]; then
            echo "::warning::Skipping tool health verification: API_SECRET_KEY not configured"
            exit 0
          fi

          TOOLS_HEALTH_JSON=$(curl -sf http://localhost:8000/health/tools \
            -H "Authorization: Bearer $API_SECRET_KEY")
          export TOOLS_HEALTH_JSON

          FAILED_COUNT=$(python3 -c 'import json, os; print(json.loads(os.environ["TOOLS_HEALTH_JSON"]).get("summary", {}).get("failed_count", 0))')
          if [ "$FAILED_COUNT" != "0" ]; then
            echo "::warning::$FAILED_COUNT tools failed to load. Check /health/tools for details."
          else
            echo "All tools loaded successfully"
          fi

      - name: Secrets health check
        run: |
          for i in $(seq 1 90); do
            CID=$(docker compose ps -q secrets 2>/dev/null)
            if [ -z "$CID" ]; then
              sleep 1
              continue
            fi
            FMT='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}'
            STATUS=$(docker inspect --format "$FMT" "$CID")
            if [ "$STATUS" = "healthy" ]; then
              echo "Secrets healthy after ${i}s"
              exit 0
            fi
            if [ "$STATUS" = "unhealthy" ]; then
              echo "Secrets unhealthy"
              docker compose logs --tail 50 secrets || true
              exit 1
            fi
            sleep 1
          done
          echo "Secrets health check timed out"
          docker compose logs --tail 50 secrets || true
          exit 1

      # --- Notify ---

      - name: Notify Slack
        if: always()
        continue-on-error: true
        run: |
          if [ -z "${OPENAI_API_KEY:-}" ] || [ -z "${SLACK_BOT_TOKEN:-}" ]; then
            echo "Skipping Slack notification: missing secrets"
            exit 0
          fi

          ERROR_LOG=""
          if [ "${{ job.status }}" = "failure" ]; then
            ERROR_LOG=$(gh run view ${{ github.run_id }} --log-failed --repo ${{ github.repository }} 2>&1 | tail -40 || echo "Failed to fetch logs")
          fi

          export OPENAI_API_KEY SLACK_BOT_TOKEN
          ./scripts/deploy-notify.sh \
            "${{ github.event.before }}" \
            "${{ github.sha }}" \
            "all" \
            "${{ github.repository }}" \
            "${{ job.status }}" \
            "$ERROR_LOG"
