name: Publish Images

on:
  push:
    branches: [main]
    tags: [v*]
    paths:
      - .github/workflows/publish-images.yml
      - services/**
      - centaur_sdk/**
      - packages/**
      - tools/**
      - scripts/bootstrap-k8s-secrets.sh
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .agents/skills/**
  pull_request:
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            image: centaur-api
            dockerfile: services/api/Dockerfile
            target: ""
          - service: slackbot
            image: centaur-slackbot
            dockerfile: services/slackbot/Dockerfile
            target: ""
          - service: secrets
            image: centaur-secrets
            dockerfile: services/secrets/Dockerfile
            target: ""
          - service: pgbouncer
            image: centaur-pgbouncer
            dockerfile: services/pgbouncer/Dockerfile
            target: ""
          - service: agent
            image: centaur-agent
            dockerfile: services/sandbox/Dockerfile
            target: sandbox
          - service: iron-proxy
            image: centaur-iron-proxy
            dockerfile: services/iron-proxy/Dockerfile
            target: ""
          - service: firewall-manager
            image: centaur-firewall-manager
            dockerfile: services/firewall-manager/Dockerfile
            target: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for ${{ matrix.image }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/paradigmxyz/${{ matrix.image }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=edge,enable={{is_default_branch}}
            type=semver,pattern={{raw}}
            type=ref,event=pr
            type=sha
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
        env:
          DOCKER_METADATA_PR_HEAD_SHA: true

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
