services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ai_v2
      POSTGRES_USER: tempo
      POSTGRES_PASSWORD: tempo_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tempo -d ai_v2"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://tempo:tempo_dev@postgres:5432/ai_v2
      SLACKBOT_URL: http://slackbot:3001
      AI_V2_LOG_LEVEL: info
      OP_VAULT: AI-V2
      OP_EMAIL: ${OP_EMAIL:-}
      OP_SECRET_KEY: ${OP_SECRET_KEY:-}
      OP_MASTER_PASSWORD: ${OP_MASTER_PASSWORD:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./tools:/app/tools
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  etl:
    build: .
    command: ["uv", "run", "ai-v2", "continuous"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://tempo:tempo_dev@postgres:5432/ai_v2
      OP_VAULT: AI-V2
      OP_EMAIL: ${OP_EMAIL:-}
      OP_SECRET_KEY: ${OP_SECRET_KEY:-}
      OP_MASTER_PASSWORD: ${OP_MASTER_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  slackbot:
    build:
      context: apps/slackbot
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379
      AI_V2_API_URL: http://api:8000
      AI_V2_API_KEY: ${API_SECRET_KEY}
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  auth:
    build: services/auth
    environment:
      UI_PASSWORD: ${UI_PASSWORD:-}
      API_SECRET_KEY: ${API_SECRET_KEY:-}
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./monitoring/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth
      - api
      - slackbot
      - grafana
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SERVER_ROOT_URL: http://localhost:8000/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: X-Forwarded-User
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - lokidata:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  grafanadata:
  prometheusdata:
  lokidata:
