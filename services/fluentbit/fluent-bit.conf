[SERVICE]
    Flush         1
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf

# Collect all Docker container logs
[INPUT]
    Name          tail
    Tag           docker.*
    Path          /var/lib/docker/containers/*/*.log
    Parser        docker
    Docker_Mode   On
    Refresh_Interval  5
    Mem_Buf_Limit 10MB
    Skip_Long_Lines On
    DB            /fluent-bit/etc/tail-db

# Parse JSON log content from containers
[FILTER]
    Name          parser
    Match         docker.*
    Key_Name      log
    Parser        json_log
    Reserve_Data  On

# Normalize message/service fields before shipping to VictoriaLogs.
[FILTER]
    Name          modify
    Match         docker.*
    Copy          msg _msg
    Copy          event _msg
    Copy          subtype _msg
    Copy          type _msg
    Copy          log _msg
    Copy          container service
    Copy          container_name service

# Drop docker-socket-proxy logs
[FILTER]
    Name          grep
    Match         docker.*
    Exclude       container_name centaur-docker-socket-proxy

# Drop pgbouncer logs
[FILTER]
    Name          grep
    Match         docker.*
    Exclude       container_name centaur-pgbouncer

# Drop health check noise
[FILTER]
    Name          grep
    Match         docker.*
    Exclude       log GET /health

# Drop metrics endpoint noise
[FILTER]
    Name          grep
    Match         docker.*
    Exclude       log GET /metrics

# Send to VictoriaLogs native JSON line endpoint
[OUTPUT]
    Name          http
    Match         docker.*
    Host          victorialogs
    Port          9428
    URI           /insert/jsonline?_stream_fields=container_name,service,level&_msg_field=_msg&_time_field=timestamp
    Format        json_lines
    Json_date_format iso8601
    Compress      gzip
